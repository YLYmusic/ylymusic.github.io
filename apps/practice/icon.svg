<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0f1115"/>

  <!-- chromatic (non-scale) positions -->
  <g fill="#2a313c">
    <circle cx="342" cy="107" r="7"/>
    <circle cx="428" cy="256" r="7"/>
    <circle cx="256" cy="428" r="7"/>
    <circle cx="107" cy="342" r="7"/>
    <circle cx="107" cy="170" r="7"/>
  </g>

  <!-- major-scale tones -->
  <g fill="#5bb8ff">
    <circle cx="405" cy="170" r="15"/>
    <circle cx="405" cy="342" r="15"/>
    <circle cx="342" cy="405" r="15"/>
    <circle cx="170" cy="405" r="15"/>
    <circle cx="84"  cy="256" r="15"/>
    <circle cx="170" cy="107" r="15"/>
  </g>

  <!-- tonic -->
  <circle cx="256" cy="84" r="20" fill="#e6b566"/>

  <!-- die (randomizer) -->
  <g transform="rotate(-10 256 256)">
    <rect x="181" y="181" width="150" height="150" rx="26" fill="#1a1e26" stroke="#5bb8ff" stroke-width="6"/>
    <g fill="#ffffff">
      <circle cx="256" cy="256" r="12"/>
      <circle cx="218" cy="218" r="12"/>
      <circle cx="294" cy="218" r="12"/>
      <circle cx="218" cy="294" r="12"/>
      <circle cx="294" cy="294" r="12"/>
    </g>
  </g>
</svg>
