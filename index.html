<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>YLY - Being In It</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  </head>
  <body>
    <main class="site-shell">
      <header class="site-header" aria-label="YLY">
        <a class="wordmark" href="#being-in-it" aria-label="YLY home"></a>
        <nav class="header-links" aria-label="Contact and social links">
          <a href="mailto:mail@ylylovesyou.com">mail</a>
          <a href="https://www.instagram.com/ylylovesyou/">instagram</a>
          <a href="https://www.tiktok.com/@ylymusic/">tiktok</a>
        </nav>
      </header>

      <section class="release-stage" aria-label="EP archive">
        <div class="release-rail" id="release-rail">
          <article class="release-panel previous-release" id="yly-loves-you" aria-label="YLY loves you EP">
            <div class="legacy-site">
              <div class="legacy-artwork">
                <img src="album_cover.jpg" alt="YLY loves you EP cover">
              </div>
              <p class="kicker">2025 EP</p>


              <div class="legacy-links" aria-label="Listen to YLY loves you">
                <a href="https://ylylovesyou.bandcamp.com/album/yly-loves-you" class="fab fa-bandcamp" aria-label="Bandcamp"></a>
                <a href="https://open.spotify.com/album/4OTl0z4odEZYqyvpbcHPyf?si=pC_MqrgvQ2mm-rchQKB4fw" class="fab fa-spotify" aria-label="Spotify"></a>
                <a href="https://www.youtube.com/playlist?list=PLYMAM42odYYIsQ9cOZPLt8int4KHxELVw" class="fab fa-youtube" aria-label="YouTube"></a>
                <a href="https://music.apple.com/us/album/yly-loves-you-ep/1790475335" class="fab fa-apple" aria-label="Apple Music"></a>
                <a href="https://music.amazon.de/albums/B0DT29D6WF?marketplaceId=A1PA6795UKMFR9" class="fab fa-amazon" aria-label="Amazon Music"></a>
                <!-- <a href="https://soundcloud.com/ylylovesyou" class="fab fa-soundcloud" aria-label="SoundCloud"></a> -->
                <a href="https://www.deezer.com/en/album/698128671" class="fab fa-deezer" aria-label="Deezer"></a>
                <!-- <a href="https://www.instagram.com/ylylovesyou/" class="fab fa-instagram" aria-label="Instagram"></a>
                <a href="https://www.tiktok.com/@ylymusic/" class="fab fa-tiktok" aria-label="TikTok"></a> -->
              </div>

            </div>
          </article>

          <article class="release-panel current-release" id="being-in-it" aria-label="Being In It EP">
            <div class="release-card-inner">
              <div class="cover-grid" aria-label="Being In It singles">
                <figure class="single-cover is-upcoming" data-release-date="2026-06-12T00:00:00+02:00">
                  <img src="beinginit_albumcovers/findingspace-2.png" alt="Finding Space cover">
                  <figcaption class="countdown" aria-live="polite"></figcaption>
                </figure>

                <figure class="single-cover is-upcoming" data-release-date="2026-07-03T00:00:00+02:00">
                  <img src="beinginit_albumcovers/safety-2.png" alt="Safety cover">
                  <figcaption class="countdown" aria-live="polite"></figcaption>
                </figure>

                <figure class="single-cover is-upcoming" data-release-date="2026-08-14T00:00:00+02:00">
                  <img src="beinginit_albumcovers/beinginit.png" alt="Being In It cover">
                  <figcaption class="countdown" aria-live="polite"></figcaption>
                </figure>

                <figure class="single-cover long-title is-upcoming" data-release-date="2026-07-24T00:00:00+02:00">
                  <img src="beinginit_albumcovers/keepwakingup.png" alt="You Can Keep Waking Up But You Will Never Be Awake cover">
                  <figcaption class="countdown" aria-live="polite"></figcaption>
                </figure>
              </div>

              <div class="release-copy">
                <p class="kicker">Current EP</p>
                <div class="platform-links" aria-label="Listen to Being In It">
                  <a href="https://ylylovesyou.bandcamp.com/" class="fab fa-bandcamp" aria-label="Bandcamp"></a>
                  <a href="https://open.spotify.com/artist/1iFcctvcdihhJ2YFnMssKw?si=pk2XTYf7Q0OBERR35EQdWw" class="fab fa-spotify" aria-label="Spotify"></a>
                  <a href="http://www.youtube.com/@YLYlovesyou" class="fab fa-youtube" aria-label="YouTube"></a>
                  <a href="https://music.apple.com/us/artist/yly/1790474204" class="fab fa-apple" aria-label="Apple Music"></a>
                  <a href="https://music.amazon.de/artists/B0DT252YR9/yly" class="fab fa-amazon" aria-label="Amazon Music"></a>
                  <!-- <a href="https://soundcloud.com/ylylovesyou" class="fab fa-soundcloud" aria-label="SoundCloud"></a> -->
                  <a href="https://deezer.page.link/upFnacj7zC2CUhL38" class="fab fa-deezer" aria-label="Deezer"></a>
                </div>
              </div>
            </div>
          </article>
        </div>

        <div class="rail-hint" aria-hidden="true">
          <span></span>
          <span class="is-active"></span>
        </div>
      </section>
    </main>

    <script src="index.js"></script>
  </body>
</html>
